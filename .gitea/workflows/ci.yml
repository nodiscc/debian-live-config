name: CI
on:
  push:

concurrency:
  group: ${{ gitea.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: host
    steps:
    - name: checkout repo
      uses: actions/checkout@v2
    - name: run build
      run: make
    - name: compute and sign checksums
      run: make checksums
    - name: cache downloaded packages
      uses: actions/cache@v3
      with:
        path: |
          cache/downloads/
          cache/packages.bootstrap/
          cache/packages.chroot/
          cache/packages.installer_debian-installer.udeb/
    - name: debug
      run: ls
    # files generated by the build process must be explicitely cleaned, else the builtin post-build action will not be able to remove files ownerd by root created by sudo lb build
    - name: clean build artifacts
      run: make clean
